<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ShowTrackr</title>
    <link rel="stylesheet" href="CSS/style.css" />
  </head>

  <body>
    <header class="navbar">
      <div class="left">
        <div class="logo">ShowTrackr</div>

        <nav>
          <a href="index.html">Home</a>
          <a href="add.html">Add</a>
        </nav>
      </div>

      <div class="auth">
        <a href="login.html">Login</a>
        <a href="Signup .html">Sign up</a>
      </div>
    </header>

   
    <section class="alphabet">
      <span data-letter="ALL">All</span>
      <span data-letter="0-9">0-9</span>
      <span data-letter="A">A</span><span data-letter="B">B</span
      ><span data-letter="C">C</span><span data-letter="D">D</span>
      <span data-letter="E">E</span><span data-letter="F">F</span
      ><span data-letter="G">G</span><span data-letter="H">H</span>
      <span data-letter="I">I</span><span data-letter="J">J</span
      ><span data-letter="K">K</span><span data-letter="L">L</span>
      <span data-letter="M">M</span><span data-letter="N">N</span
      ><span data-letter="O">O</span><span data-letter="P">P</span>
      <span data-letter="Q">Q</span><span data-letter="R">R</span
      ><span data-letter="S">S</span><span data-letter="T">T</span>
      <span data-letter="U">U</span><span data-letter="V">V</span
      ><span data-letter="W">W</span><span data-letter="X">X</span>
      <span data-letter="Y">Y</span><span data-letter="Z">Z</span>
    </section>

    
    <section class="categories">
      <button data-genre="ALL">All</button>
      <button data-genre="Action">Action</button>
      <button data-genre="Adventure">Adventure</button>
      <button data-genre="Animation">Animation</button>
      <button data-genre="Children">Children</button>
      <button data-genre="Comedy">Comedy</button>
      <button data-genre="Crime">Crime</button>
      <button data-genre="Documentary">Documentary</button>
      <button data-genre="Drama">Drama</button>
      <button data-genre="Family">Family</button>
      <button data-genre="Fantasy">Fantasy</button>
      <button data-genre="Horror">Horror</button>
      <button data-genre="Mystery">Mystery</button>
      <button data-genre="Reality">Reality</button>
      <button data-genre="Romance">Romance</button>
      <button data-genre="Sport">Sport</button>
      <button data-genre="Suspense">Suspense</button>
      <button data-genre="Talk Show">Talk Show</button>
      <button data-genre="Travel">Travel</button>
    </section>

    <main class="container">
      <div class="header-row">
        <h2>Top 12 Shows</h2>
        <input type="text" placeholder="Search..." />
      </div>

      <div class="grid"></div>
    </main>

    <script src="JS/data.js"></script>
    <script src="JS/home.js"></script>
  </body>
</html>
