<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ShowTrackr</title>
    <link rel="stylesheet" href="CSS/style.css" />
  
  </head>
  <body>
    <header class="navbar">
     
      <div class="left">
        <div class="logo">ShowTrackr</div>

        <nav>

    <section class="alphabet">

    <section class="categories">
      <button>Action</button>
      <button>Adventure</button>
      <button>Animation</button>
      <button>children</button>
      <button>Comedy</button>
      <button>crime</button>

      <button>Drama</button>
      <button>Family</button>
      <button>Fantasy</button>
      <button>fond</button>

      <button>Mystary</button>
      <button>News</button>

      <button>Sport</button>
      <button>Suspense</button>
      <button>Talk Show</button>
      <button>Inliller</button>
      <button>Travel</button>

        <input type="text" placeholder="Search..." />
      </div>

      <div class="grid">

          <a href="detail.html">
          <img src="assets/images/164456-1024__06607.jpg"/></a>

          <p>Episodes: 84</p>
        </div>

        <div class="card">
          <img src="assets/images/images.jpeg"/>
          <h3>Breaking Bad</h3>
          <p>Episodes: 79</p>

        <div class="card">

        <div class="card">
          <img src="assets/images/himymposter.webp"/>
          <h3>How I Met Your Mother</h3>
          <p>Episodes: 219</p>
        </div>
      </div>
